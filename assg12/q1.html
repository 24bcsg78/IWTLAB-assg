<html>
<head>
    <title>DOM Manipulation</title>
</head>
	<body>
		<h2 id="myHeading"> Hello World</h2>
		<button onclick="changeHeadingText()">Change Text</button>
		<script>
			function changeHeadingText() {
            const headingElement = document.getElementById("myHeading");
            headingElement.textContent = "Welcome to DOM Manipulation";
        }
		</script>
	</body>
</html>
